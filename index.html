<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>にほんご N3 ことばげーむ</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --primary: #3b82f6;
        --primary-dark: #1e40af;
        --ok: #0f766e;
        --ng: #b91c1c;
        --text: #0f172a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", system-ui, sans-serif;
        background: linear-gradient(160deg, #eff6ff, #f8fafc 35%, #ecfeff);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1rem;
      }

      .app {
        width: min(980px, 100%);
        background: var(--card);
        border-radius: 18px;
        box-shadow: 0 10px 30px rgba(2, 6, 23, 0.12);
        overflow: hidden;
      }

      header {
        padding: 1.2rem 1.5rem;
        background: #dbeafe;
        border-bottom: 1px solid #bfdbfe;
      }

      h1 {
        margin: 0;
        font-size: 1.35rem;
      }

      .subtitle {
        margin-top: 0.4rem;
        color: #334155;
        font-size: 0.95rem;
      }

      main {
        padding: 1.5rem;
        display: grid;
        gap: 1rem;
      }

      .status {
        display: flex;
        gap: 0.7rem;
        flex-wrap: wrap;
        font-size: 0.92rem;
      }

      .badge {
        background: #f1f5f9;
        padding: 0.45rem 0.8rem;
        border-radius: 999px;
      }

      .card {
        border: 1px solid #e2e8f0;
        border-radius: 14px;
        padding: 1.2rem;
        background: #fff;
      }

      .mode {
        display: inline-block;
        margin-bottom: 0.6rem;
        font-size: 0.84rem;
        background: #eef2ff;
        border: 1px solid #c7d2fe;
        color: #3730a3;
        border-radius: 999px;
        padding: 0.25rem 0.65rem;
      }

      .prompt {
        font-size: 1.3rem;
        font-weight: 700;
        margin-bottom: 0.8rem;
        line-height: 1.5;
      }

      .options {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 0.7rem;
      }

      .option-btn,
      button {
        border: 1px solid #cbd5e1;
        background: #ffffff;
        color: #0f172a;
        border-radius: 10px;
        padding: 0.7rem 0.8rem;
        font-size: 0.96rem;
        cursor: pointer;
        transition: 0.2s ease;
      }

      .option-btn:hover,
      button:hover {
        transform: translateY(-1px);
        border-color: #93c5fd;
      }

      .option-btn.correct {
        background: #ccfbf1;
        border-color: #14b8a6;
      }

      .option-btn.wrong {
        background: #fee2e2;
        border-color: #f87171;
      }

      .controls {
        display: flex;
        gap: 0.7rem;
        flex-wrap: wrap;
      }

      .primary {
        background: var(--primary);
        color: white;
        border-color: var(--primary-dark);
      }

      .message {
        min-height: 1.5em;
        font-weight: 600;
        margin-top: 0.9rem;
      }

      .message.ok {
        color: var(--ok);
      }

      .message.ng {
        color: var(--ng);
      }

      .pos-summary {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 0.5rem;
      }

      .pos-item {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 0.45rem 0.6rem;
        font-size: 0.88rem;
      }

      @media (max-width: 520px) {
        .prompt {
          font-size: 1.15rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <h1>日本語 N3 ことばゲーム（中国語対応）</h1>
        <p class="subtitle">出題文はかな表記、選択肢は中国語中心の4択クイズ + 聞き取りモード</p>
      </header>

      <main>
        <section class="status" aria-live="polite">
          <span class="badge" id="progress">問題: 0 / 0</span>
          <span class="badge" id="score">スコア: 0</span>
          <span class="badge" id="streak">連続正解: 0</span>
          <span class="badge" id="modeCount">聞き取り: 0 問</span>
        </section>

        <section class="card" aria-label="クイズカード">
          <span class="mode" id="modeLabel">モード: 読み</span>
          <div class="prompt" id="prompt">よみこみちゅう...</div>
          <div class="controls" id="audioControls" style="display: none">
            <button id="playAudioBtn">🔊 もう一度聞く</button>
          </div>
          <div class="options" id="options"></div>
          <p id="message" class="message"></p>
        </section>

        <section class="controls">
          <button class="primary" id="nextBtn">次の問題</button>
          <button id="resetBtn">最初から</button>
        </section>

        <section class="card">
          <p style="margin-top: 0">N3語彙を品詞別にバランスよく出題します。</p>
          <div class="pos-summary" id="posSummary"></div>
        </section>
      </main>
    </div>

    <script>
      const words = [
        // めいし
        { kana: "きかい", zh: "机会", pos: "めいし" },
        { kana: "よてい", zh: "计划", pos: "めいし" },
        { kana: "れんらく", zh: "联络", pos: "めいし" },
        { kana: "しゅうかん", zh: "习惯", pos: "めいし" },
        { kana: "けいけん", zh: "经验", pos: "めいし" },
        // どうし
        { kana: "つづける", zh: "继续", pos: "どうし" },
        { kana: "くらべる", zh: "比较", pos: "どうし" },
        { kana: "ふえる", zh: "增加", pos: "どうし" },
        { kana: "まにあう", zh: "赶得上", pos: "どうし" },
        { kana: "みつける", zh: "找到", pos: "どうし" },
        // けいようし
        { kana: "きびしい", zh: "严格", pos: "けいようし" },
        { kana: "うれしい", zh: "高兴", pos: "けいようし" },
        { kana: "たしか", zh: "确实", pos: "けいようし" },
        { kana: "ゆたか", zh: "丰富", pos: "けいようし" },
        { kana: "めんどう", zh: "麻烦", pos: "けいようし" },
        // ふくし
        { kana: "しっかり", zh: "扎实地", pos: "ふくし" },
        { kana: "たいてい", zh: "大多", pos: "ふくし" },
        { kana: "とつぜん", zh: "突然", pos: "ふくし" },
        { kana: "できるだけ", zh: "尽量", pos: "ふくし" },
        { kana: "とくに", zh: "特别", pos: "ふくし" },
      ];

      const QUIZ_TYPES = {
        meaning: "意味選択",
        listening: "聞き取り",
      };

      const promptEl = document.getElementById("prompt");
      const optionsEl = document.getElementById("options");
      const messageEl = document.getElementById("message");
      const progressEl = document.getElementById("progress");
      const scoreEl = document.getElementById("score");
      const streakEl = document.getElementById("streak");
      const modeCountEl = document.getElementById("modeCount");
      const modeLabelEl = document.getElementById("modeLabel");
      const posSummaryEl = document.getElementById("posSummary");
      const nextBtn = document.getElementById("nextBtn");
      const resetBtn = document.getElementById("resetBtn");
      const playAudioBtn = document.getElementById("playAudioBtn");
      const audioControlsEl = document.getElementById("audioControls");

      let deck = [];
      let current = null;
      let questionNumber = 0;
      let score = 0;
      let streak = 0;
      let answered = false;
      let listeningCount = 0;

      const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);

      const groupedWords = words.reduce((acc, word) => {
        if (!acc[word.pos]) acc[word.pos] = [];
        acc[word.pos].push(word);
        return acc;
      }, {});

      function buildBalancedDeck() {
        const copied = Object.fromEntries(
          Object.entries(groupedWords).map(([pos, items]) => [pos, shuffle(items)]),
        );
        const order = shuffle(Object.keys(copied));
        const newDeck = [];

        let hasWords = true;
        while (hasWords) {
          hasWords = false;
          order.forEach((pos) => {
            const picked = copied[pos].pop();
            if (picked) {
              newDeck.push(picked);
              hasWords = true;
            }
          });
        }

        return newDeck;
      }

      function renderPosSummary() {
        posSummaryEl.innerHTML = "";
        Object.keys(groupedWords).forEach((pos) => {
          const item = document.createElement("div");
          item.className = "pos-item";
          item.textContent = `${pos}: ${groupedWords[pos].length}語`;
          posSummaryEl.appendChild(item);
        });
      }

      function initGame() {
        deck = buildBalancedDeck();
        questionNumber = 0;
        score = 0;
        streak = 0;
        answered = false;
        listeningCount = 0;
        messageEl.textContent = "";
        messageEl.className = "message";
        renderPosSummary();
        updateStatus();
        loadQuestion();
      }

      function updateStatus() {
        progressEl.textContent = `問題: ${Math.min(questionNumber + 1, words.length)} / ${words.length}`;
        scoreEl.textContent = `スコア: ${score}`;
        streakEl.textContent = `連続正解: ${streak}`;
        modeCountEl.textContent = `聞き取り: ${listeningCount}問`;
      }

      function speak(text) {
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = "ja-JP";
        utter.rate = 0.93;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utter);
      }

      function getQuizType() {
        if (questionNumber > 0 && questionNumber % 3 === 0) {
          return "listening";
        }
        return Math.random() < 0.35 ? "listening" : "meaning";
      }

      function makeChoicesByMeaning(target) {
        const wrongChoices = shuffle(words.filter((w) => w.zh !== target.zh).map((w) => w.zh)).slice(0, 3);
        return shuffle([target.zh, ...wrongChoices]);
      }

      function loadQuestion() {
        if (deck.length === 0) {
          promptEl.textContent = "おつかれさま。ぜんもん しゅうりょう。";
          optionsEl.innerHTML = "";
          audioControlsEl.style.display = "none";
          modeLabelEl.textContent = "モード: 終了";
          messageEl.textContent = `さいしゅうすこあ: ${score} / ${words.length * 10}`;
          messageEl.className = "message ok";
          progressEl.textContent = `問題: ${words.length} / ${words.length}`;
          return;
        }

        answered = false;
        current = deck.shift();
        const quizType = getQuizType();
        current.quizType = quizType;
        modeLabelEl.textContent = `モード: ${QUIZ_TYPES[quizType]} / ${current.pos}`;

        if (quizType === "meaning") {
          audioControlsEl.style.display = "none";
          promptEl.textContent = `「${current.kana}」の いみ（ちゅうごくご）は どれ？`;
          renderOptions(makeChoicesByMeaning(current), "meaning");
        } else {
          listeningCount += 1;
          audioControlsEl.style.display = "flex";
          promptEl.textContent = "おとをきいて、あう ことばを えらんでください。";
          renderOptions(makeChoicesByMeaning(current), "listening");
          speak(current.kana);
        }

        messageEl.textContent = "";
        messageEl.className = "message";
        updateStatus();
      }

      function renderOptions(choices, quizType) {
        optionsEl.innerHTML = "";

        choices.forEach((choice) => {
          const btn = document.createElement("button");
          btn.textContent = choice;
          btn.className = "option-btn";
          btn.dataset.value = choice;
          btn.addEventListener("click", () => handleAnswer(btn, choice));
          optionsEl.appendChild(btn);
        });
      }

      function handleAnswer(btn, selected) {
        if (answered) return;
        answered = true;

        const buttons = document.querySelectorAll(".option-btn");
        buttons.forEach((b) => (b.disabled = true));

        const correctValue = current.zh;

        if (selected === correctValue) {
          score += 10;
          streak += 1;
          btn.classList.add("correct");
          messageEl.textContent = `せいかい！ ${current.kana} = ${current.zh}`;
          messageEl.className = "message ok";
        } else {
          streak = 0;
          btn.classList.add("wrong");
          buttons.forEach((b) => {
            if (b.dataset.value === correctValue) b.classList.add("correct");
          });
          messageEl.textContent = `ざんねん。せいかいは「${current.kana}（${current.zh}）」です。`;
          messageEl.className = "message ng";
        }

        questionNumber += 1;
        updateStatus();
      }

      playAudioBtn.addEventListener("click", () => {
        if (current && current.quizType === "listening") {
          speak(current.kana);
        }
      });

      nextBtn.addEventListener("click", loadQuestion);
      resetBtn.addEventListener("click", initGame);

      initGame();
    </script>
  </body>
</html>
